<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style type="text/css">
      /*<![CDATA[*/
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      .bg { fill: #0b0f19; }
      .phone-body { fill: #111827; stroke: #374151; stroke-width: 2; }
      .phone-screen { fill: #f8fafc; }
      .notch-bg { fill: #111827; }

      /* Typography */
      .title-font { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; fill: #f8fafc; }
      .desc-font { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
      .small-font { font-family: 'Inter', sans-serif; font-size: 10px; fill: #475569; font-weight: 600; }
      .label-font { font-family: 'Inter', sans-serif; font-size: 11px; fill: #1e293b; font-weight: 600; }
      .sub-label-font { font-family: 'Inter', sans-serif; font-size: 9px; fill: #64748b; font-weight: 500; }
      .feature-head { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #e2e8f0; }
      .feature-body { font-family: 'Inter', sans-serif; font-size: 11px; fill: #64748b; }
      .badge-font { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; }
      .code-font { font-family: 'Fira Code', 'Consolas', monospace; font-size: 11px; }

      .header-bar { fill: #6366f1; }
      .header-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; }

      /* Dropdown UI styles */
      .search-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .search-box-active { stroke: #6366f1; stroke-width: 1.5; }
      .dropdown-list { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.06)); }
      .item-hover { fill: #f1f5f9; }

      /* ══════ TIMELINE ANIMATION ══════
         0s - 1.5s  : Empty, idle placeholder "Search users..."
         1.5s - 1.8s: Input Focused (border turns purple)
         1.8s - 3.2s: Typing "Jane"
         3.2s - 4.0s: Debounce Delay (Input loading spinner active)
         4.0s - 6.5s: Dropdown pops open (First Page: Jane Doe, Janet, Janie)
         6.5s - 8.0s: Scroll down, Spinner at footer, Page 2 loaded (Janice, Jansen)
         8.0s - 8.8s: Select "Jane Doe" (taps, dropdown closes, selected pill shown)
         8.8s - 10s : Hold selected, loops
      ═════════════════════════════════ */

      /* Input Border State */
      @keyframes borderState {
        0%, 15% { stroke: #cbd5e1; stroke-width: 1; }
        18%, 82% { stroke: #6366f1; stroke-width: 1.5; }
        85%, 100% { stroke: #cbd5e1; stroke-width: 1; }
      }
      .input-border { animation: borderState 10s ease infinite; }

      /* Selection Pill visibility in input */
      @keyframes selectionPill {
        0%, 82% { opacity: 0; }
        85%, 100% { opacity: 1; }
      }
      .selected-pill { animation: selectionPill 10s ease infinite; }

      /* Placeholder Text visibility */
      @keyframes placeholderVis {
        0%, 18% { opacity: 1; }
        19%, 100% { opacity: 0; }
      }
      .placeholder-text { animation: placeholderVis 10s ease infinite; }

      /* Typing text ("Jane") visibility */
      @keyframes typeText {
        0%, 18% { content: ""; }
        21% { content: "J"; }
        24% { content: "Ja"; }
        27% { content: "Jan"; }
        30%, 82% { content: "Jane"; }
        85%, 100% { content: ""; }
      }
      .typed-text::after {
        content: "";
        animation: typeText 10s steps(1) infinite;
      }

      /* Blinking cursor */
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes cursorVis {
        0%, 18% { opacity: 0; }
        19%, 82% { opacity: 1; }
        85%, 100% { opacity: 0; }
      }
      .cursor-line {
        animation: blink 0.8s step-end infinite, cursorVis 10s steps(1) infinite;
      }

      /* Debounce Loading Spinner rotation inside input */
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spinnerVis {
        0%, 32% { opacity: 0; }
        33%, 39% { opacity: 1; }
        40%, 100% { opacity: 0; }
      }
      .debounce-spinner {
        animation: rotate 1s linear infinite, spinnerVis 10s steps(1) infinite;
        transform-origin: 206px 113px;
      }

      /* Dropdown List overall Slide/Fade open */
      @keyframes dropdownOpen {
        0%, 40% { opacity: 0; transform: translateY(-5px); pointer-events: none; }
        43%, 82% { opacity: 1; transform: translateY(0); pointer-events: auto; }
        85%, 100% { opacity: 0; transform: translateY(-5px); pointer-events: none; }
      }
      .dropdown-container {
        animation: dropdownOpen 10s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }

      /* Dropdown Scroll & Infinite Paginate Offset */
      @keyframes listScroll {
        0%, 65% { transform: translateY(0); }
        70%, 82% { transform: translateY(-84px); } /* Scrolls down past Jane Doe and Janet to show Jansen and Janice */
        85%, 100% { transform: translateY(0); }
      }
      .scrollable-list {
        animation: listScroll 10s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }

      /* Spinner at the footer representing pagination loadMore */
      @keyframes footerSpinnerVis {
        0%, 63% { opacity: 0; }
        64%, 69% { opacity: 1; }
        70%, 100% { opacity: 0; }
      }
      .footer-spinner {
        animation: rotate 1s linear infinite, footerSpinnerVis 10s steps(1) infinite;
        transform-origin: 125px 233px;
      }

      /* Infinite loaded items (Page 2) fading in */
      @keyframes page2Fade {
        0%, 69% { opacity: 0; }
        70%, 100% { opacity: 1; }
      }
      .page-2-item {
        animation: page2Fade 10s ease infinite;
      }

      /* Select Tap Ring */
      @keyframes tapSelect {
        0%, 80% { transform: scale(0); opacity: 0; }
        82% { transform: scale(1); opacity: 0.6; }
        84%, 100% { transform: scale(1.6); opacity: 0; }
      }
      .ring-select {
        animation: tapSelect 10s ease-out infinite;
        transform-origin: 125px 172px;
      }

      /* Feature card pulse */
      @keyframes fpulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .fp { animation: fpulse 3s ease-in-out infinite; }
      /*]]>*/
    </style>

    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="16" ry="16" />

  <!-- Title -->
  <g transform="translate(30, 40)">
    <text class="title-font">🚀 Paginated Search Dropdown</text>
    <text class="desc-font" y="24">Highly customizable async search dropdown with infinite pagination and debouncing</text>
  </g>

  <!-- ════════════ PHONE MOCKUP ════════════ -->
  <g transform="translate(55, 80)">
    <!-- Phone body -->
    <rect class="phone-body" width="250" height="400" rx="28" ry="28" />
    <!-- Screen -->
    <rect class="phone-screen" x="10" y="10" width="230" height="380" rx="20" ry="20" />
    <!-- Notch -->
    <rect class="notch-bg" x="80" y="10" width="90" height="24" rx="0" ry="0" />
    <rect class="notch-bg" x="80" y="10" width="90" height="18" rx="0" ry="10" />
    <!-- Status bar -->
    <text class="small-font" x="24" y="28">9:41</text>
    <text class="small-font" x="202" y="28">100%</text>

    <!-- App header -->
    <rect class="header-bar" x="10" y="34" width="230" height="42" />
    <text class="header-text" x="24" y="60">Directory</text>

    <!-- Screen Content Base View -->
    <rect fill="#f8fafc" x="10" y="76" width="230" height="314" rx="0" ry="20" />

    <!-- ═══ DROP DOWN CONTAINER ═══ -->
    <g transform="translate(20, 96)">
      
      <!-- Input Field -->
      <rect class="search-box input-border" x="0" y="0" width="210" height="34" rx="6" ry="6" />
      <text class="label-font placeholder-text" x="12" y="21" fill="#94a3b8">Search users...</text>
      
      <!-- Dynamic Typed Text -->
      <text class="label-font typed-text" x="12" y="21" fill="#1e293b"></text>
      <!-- Blinking cursor -->
      <line class="cursor-line" x1="44" y1="9" x2="44" y2="23" stroke="#6366f1" stroke-width="1.5" />

      <!-- Selection Pill -->
      <g class="selected-pill">
        <rect x="6" y="5" width="80" height="24" rx="12" ry="12" fill="#6366f1" />
        <text font-family="Inter, sans-serif" font-size="9px" font-weight="700" fill="#ffffff" x="14" y="20">Jane Doe</text>
        <circle cx="73" cy="17" r="5" fill="rgba(255,255,255,0.2)" />
        <text font-family="Inter, sans-serif" font-size="8px" fill="#ffffff" x="71" y="20">×</text>
      </g>

      <!-- Debounce Spinner (Loading...) -->
      <g class="debounce-spinner" opacity="0">
        <circle cx="206" cy="113" r="6" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
        <path d="M 206,107 A 6,6 0 0,1 212,113" fill="none" stroke="#6366f1" stroke-width="1.5" />
      </g>

      <!-- Search Magnifier Icon -->
      <g transform="translate(186, 9)" opacity="0.6">
        <circle cx="6" cy="6" r="4" fill="none" stroke="#64748b" stroke-width="1.5" />
        <line x1="9" y1="9" x2="13" y2="13" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" />
      </g>

      <!-- Dropdown Menu List -->
      <g class="dropdown-container" transform="translate(0, 38)">
        <rect class="dropdown-list" width="210" height="175" rx="8" ry="8" />

        <!-- Scrollable list wrapper (Clip Path so it doesn't render outside dropdown boundaries) -->
        <g clip-path="url(#dropdown-clipper)">
          <clipPath id="dropdown-clipper">
            <rect width="210" height="175" rx="8" ry="8" />
          </clipPath>

          <g class="scrollable-list">
            <!-- Row 1: Jane Doe (Highlighted/Selected target) -->
            <g transform="translate(0, 0)">
              <rect class="item-hover" width="210" height="42" opacity="0.4" />
              <text class="label-font" x="12" y="19">Jane Doe</text>
              <text class="sub-label-font" x="12" y="32">jane.doe@example.com</text>
              <line x1="0" y1="42" x2="210" y2="42" stroke="#f1f5f9" stroke-width="1" />
            </g>

            <!-- Row 2: Janet Smith -->
            <g transform="translate(0, 42)">
              <text class="label-font" x="12" y="19">Janet Smith</text>
              <text class="sub-label-font" x="12" y="32">janet.smith@example.com</text>
              <line x1="0" y1="42" x2="210" y2="42" stroke="#f1f5f9" stroke-width="1" />
            </g>

            <!-- Row 3: Janie Jenkins -->
            <g transform="translate(0, 84)">
              <text class="label-font" x="12" y="19">Janie Jenkins</text>
              <text class="sub-label-font" x="12" y="32">janie@example.com</text>
              <line x1="0" y1="42" x2="210" y2="42" stroke="#f1f5f9" stroke-width="1" />
            </g>

            <!-- Row 4: (Page 2) Janice Miller -->
            <g class="page-2-item" transform="translate(0, 126)" opacity="0">
              <text class="label-font" x="12" y="19">Janice Miller</text>
              <text class="sub-label-font" x="12" y="32">janice.m@example.com</text>
              <line x1="0" y1="42" x2="210" y2="42" stroke="#f1f5f9" stroke-width="1" />
            </g>

            <!-- Row 5: (Page 2) Jansen Patel -->
            <g class="page-2-item" transform="translate(0, 168)" opacity="0">
              <text class="label-font" x="12" y="19">Jansen Patel</text>
              <text class="sub-label-font" x="12" y="32">jansen.p@example.com</text>
            </g>
          </g>

          <!-- Spinner at the bottom representing loading more results -->
          <g class="footer-spinner" opacity="0">
            <circle cx="125" cy="233" r="6" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
            <path d="M 125,227 A 6,6 0 0,1 131,233" fill="none" stroke="#6366f1" stroke-width="1.5" />
          </g>
        </g>
      </g>

      <!-- Selection Tap Target Ring on Jane Doe -->
      <circle class="ring-select" cx="125" cy="172" r="15" fill="none" stroke="#6366f1" stroke-width="2" />
    </g>
  </g>

  <!-- ════════════ RIGHT PANEL: FEATURES ════════════ -->
  <g transform="translate(355, 90)">
    <!-- Badges -->
    <rect x="0" y="0" width="102" height="24" rx="6" ry="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" />
    <text class="badge-font" x="8" y="16" fill="#a5b4fc">🔄 ASYNC LOAD</text>
    <rect x="112" y="0" width="112" height="24" rx="6" ry="6" fill="#1e3a2f" stroke="#059669" stroke-width="1" />
    <text class="badge-font" x="120" y="16" fill="#6ee7b7">📉 INFINITE SCROLL</text>

    <!-- Feature 1 -->
    <g transform="translate(0, 50)" class="fp">
      <circle cx="14" cy="10" r="14" fill="#1e1b4b" />
      <text x="7" y="15" font-family="Inter, sans-serif" font-size="14px">🔍</text>
      <text class="feature-head" x="36" y="8">Async Query Search</text>
      <text class="feature-body" x="36" y="24">Loads remote query operations dynamically on demand</text>
    </g>

    <!-- Feature 2 -->
    <g transform="translate(0, 105)" class="fp" style="animation-delay: 0.5s;">
      <circle cx="14" cy="10" r="14" fill="#0f172a" />
      <text x="7" y="15" font-family="Inter, sans-serif" font-size="14px">🔄</text>
      <text class="feature-head" x="36" y="8">Infinite Pagination</text>
      <text class="feature-body" x="36" y="24">FlatList scroll pagination handles thousands of entries</text>
    </g>

    <!-- Feature 3 -->
    <g transform="translate(0, 160)" class="fp" style="animation-delay: 1s;">
      <circle cx="14" cy="10" r="14" fill="#1c1917" />
      <text x="7" y="15" font-family="Inter, sans-serif" font-size="14px">⏱️</text>
      <text class="feature-head" x="36" y="8">Debounced API Guard</text>
      <text class="feature-body" x="36" y="24">Postpones search calls dynamically to secure backend bandwidth</text>
    </g>

    <!-- Feature 4 -->
    <g transform="translate(0, 215)" class="fp" style="animation-delay: 1.5s;">
      <circle cx="14" cy="10" r="14" fill="#064e3b" />
      <text x="7" y="15" font-family="Inter, sans-serif" font-size="14px">🤖</text>
      <text class="feature-head" x="36" y="8">Perfect Touch &amp; Scroll</text>
      <text class="feature-body" x="36" y="24">Zero Android gesture clipping or ScrollView locking bugs</text>
    </g>

    <!-- Code snippet -->
    <g transform="translate(0, 280)">
      <rect fill="#0f172a" width="410" height="100" rx="10" ry="10" stroke="#1e293b" stroke-width="1" />
      <text class="code-font" x="14" y="22" fill="#64748b">// Infinite paginated select dropdown</text>
      <text class="code-font" x="14" y="40" fill="#c084fc">import</text>
      <text class="code-font" x="58" y="40" fill="#e2e8f0"> { PaginatedSearchDropdown } </text>
      <text class="code-font" x="226" y="40" fill="#c084fc">from</text>
      <text class="code-font" x="14" y="58" fill="#fbbf24">'paginated-search-dropdown'</text>
      <text class="code-font" x="14" y="80" fill="#e2e8f0">&lt;</text>
      <text class="code-font" x="22" y="80" fill="#22d3ee">PaginatedSearchDropdown</text>
      <text class="code-font" x="14" y="98" fill="#fbbf24">  loadOptions</text>
      <text class="code-font" x="98" y="98" fill="#e2e8f0">={loadOptions}</text>
      <text class="code-font" x="194" y="98" fill="#fbbf24"> onSelect</text>
      <text class="code-font" x="258" y="98" fill="#e2e8f0">={handleSelect} /&gt;</text>
    </g>
  </g>
</svg>
